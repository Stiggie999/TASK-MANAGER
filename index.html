<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<style>
body {font-family: Arial; margin:0; background:#eef2f7;}
.header {background:#e9eef8; padding:20px; display:flex; justify-content:space-between;}
button {padding:10px; border:none; border-radius:10px; cursor:pointer;}
.primary {background:#2563eb; color:white;}
.card {background:white; padding:15px; margin:10px 0; border-radius:10px;}
</style>
</head>

<body>

<div class="header">
<h2>Task Manager</h2>
<button class="primary" onclick="newProject()">+ New Project</button>
</div>

<div id="projects"></div>

<div id="projectView" style="display:none; padding:20px;">
<button onclick="goHome()">← Home</button>
<button onclick="renameProject()">Rename Project</button>

<h2 id="projectTitle"></h2>

<input id="taskInput" placeholder="Task name">
<button onclick="addTask()">Add Task</button>

<div id="tasks"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")) || {projects:[]};
let current = null;

function save(){localStorage.setItem("data", JSON.stringify(data));}

function render(){
let container = document.getElementById("projects");
container.innerHTML = "";

data.projects.forEach(p=>{
let div = document.createElement("div");
div.className="card";
div.innerHTML = p.name;
div.onclick=()=>openProject(p.id);
container.appendChild(div);
});
}

function newProject(){
let name = prompt("Project name");
if(!name) return;

data.projects.push({id:Date.now(), name, tasks:[]});
save();
render();
}

function openProject(id){
current=id;
document.getElementById("projects").style.display="none";
document.getElementById("projectView").style.display="block";

let p=data.projects.find(x=>x.id===id);
document.getElementById("projectTitle").innerText=p.name;

renderTasks();
}

function goHome(){
document.getElementById("projects").style.display="block";
document.getElementById("projectView").style.display="none";
render();
}

function addTask(){
let input=document.getElementById("taskInput");
if(!input.value) return;

let p=data.projects.find(x=>x.id===current);
p.tasks.push({id:Date.now(), name:input.value});

input.value="";
save();
renderTasks();
}

function renderTasks(){
let list=document.getElementById("tasks");
list.innerHTML="";

let p=data.projects.find(x=>x.id===current);

p.tasks.forEach(t=>{
let div=document.createElement("div");
div.className="card";

div.innerHTML = `
${t.name}
<button onclick="editTask(${t.id})">Edit</button>
<button onclick="deleteTask(${t.id})">Delete</button>
`;

list.appendChild(div);
});
}

function deleteTask(id){
let p=data.projects.find(x=>x.id===current);
p.tasks = p.tasks.filter(t=>t.id!==id);
save();
renderTasks();
}

function editTask(id){
let p=data.projects.find(x=>x.id===current);
let t=p.tasks.find(x=>x.id===id);

let newName = prompt("Edit task", t.name);
if(!newName) return;

t.name=newName;
save();
renderTasks();
}

function renameProject(){
let p=data.projects.find(x=>x.id===current);
let newName = prompt("Rename project", p.name);
if(!newName) return;

p.name=newName;
save();
document.getElementById("projectTitle").innerText=newName;
render();
}

render();
</script>

</body>
</html>
