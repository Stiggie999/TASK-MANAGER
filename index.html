<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --panel-soft: #eef4ff;
      --text: #172033;
      --muted: #64748b;
      --line: #dbe4f0;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, #f7f9fc 160px, var(--bg) 100%);
      color: var(--text);
    }

    .hero {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .hero-inner,
    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 42px;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      max-width: 760px;
    }

    .page {
      padding: 24px 20px 40px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, opacity .12s ease;
    }

    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: white; box-shadow: 0 8px 18px rgba(37,99,235,0.22); }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #e7eef8; color: var(--text); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
    .btn-danger { background: #fee2e2; color: #b91c1c; }
    .hidden { display: none !important; }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 8px 0 18px;
    }

    .section-title {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.03em;
    }

    .muted { color: var(--muted); }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(219,228,240,0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .project-card {
      padding: 18px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      min-height: 140px;
    }

    .project-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(96,165,250,0.03));
      pointer-events: none;
    }

    .project-card h3 {
      margin: 0 0 10px;
      font-size: 22px;
      position: relative;
    }

    .project-meta {
      position: relative;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 14px;
    }

    .empty {
      padding: 30px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed #bfd0e7;
      background: #fbfdff;
      border-radius: var(--radius);
    }

    .workspace-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .form-card {
      padding: 20px;
      margin-bottom: 18px;
    }

    .form-title {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .grid-2,
    .grid-4 {
      display: grid;
      gap: 14px;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 7px;
      color: #334155;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cfdae8;
      background: white;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 16px;
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #7aa2ff;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .tasks-stack {
      display: grid;
      gap: 14px;
    }

    .task-card {
      padding: 18px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .task-main {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      flex: 1;
      min-width: 0;
    }

    .task-check {
      width: 22px;
      height: 22px;
      margin-top: 2px;
      accent-color: var(--primary);
      flex: 0 0 auto;
    }

    .task-title-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .task-title {
      font-size: 18px;
      font-weight: 800;
      word-break: break-word;
    }

    .task-title.done {
      text-decoration: line-through;
      color: #64748b;
    }

    .task-notes {
      margin: 0 0 10px;
      color: #475569;
      line-height: 1.45;
      word-break: break-word;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill,
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
    }

    .pill { background: #eef2f7; color: #475569; }
    .low { background: #e8f8ec; color: #1f7a38; }
    .medium { background: #fff5d8; color: #9a6700; }
    .high { background: #ffe8db; color: #c2410c; }
    .urgent { background: #fee2e2; color: #b91c1c; }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mini-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .mini-edit { background: #dbeafe; color: #1d4ed8; }
    .mini-delete { background: #fee2e2; color: #b91c1c; }

    .summary-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .summary-chip {
      background: white;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      color: #334155;
      font-weight: 700;
      font-size: 13px;
    }

    @media (max-width: 840px) {
      h1 { font-size: 36px; }
      .grid-2, .grid-4 { grid-template-columns: 1fr; }
      .task-card { flex-direction: column; }
      .task-actions { justify-content: flex-start; }
      .hero-top { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-top">
        <div>
          <h1>Task Manager</h1>
          <p class="subtitle">Manage projects, assign tasks, set priorities, and schedule by date.</p>
        </div>
        <button class="btn btn-primary" id="homeNewProjectBtn">+ New Project</button>
      </div>
    </div>
  </div>

  <div class="page">
    <div id="homeScreen">
      <div class="section-head">
        <h2 class="section-title">Projects</h2>
      </div>
      <div id="projectList" class="project-grid"></div>
    </div>

    <div id="projectScreen" class="hidden">
      <div class="workspace-head">
        <div class="row">
          <button class="btn btn-secondary" id="backBtn">← Home</button>
          <div>
            <h2 id="projectTitle" class="section-title" style="margin:0 0 4px;"></h2>
            <div class="muted" id="projectSubtext">Project workspace</div>
          </div>
        </div>
        <button class="btn btn-primary" id="showTaskFormBtn">+ Add Task</button>
      </div>

      <div class="summary-bar" id="summaryBar"></div>

      <div id="taskFormCard" class="card form-card hidden">
        <h3 class="form-title" id="taskFormTitle">Add Task</h3>

        <div class="grid-2">
          <div>
            <label for="taskTitle">Task title</label>
            <input id="taskTitle" placeholder="Enter task title" />
          </div>
          <div>
            <label for="assignedTo">Assign to</label>
            <select id="assignedTo">
              <option value="">Unassigned</option>
              <option>Alice</option>
              <option>Ben</option>
              <option>Charlie</option>
              <option>Dana</option>
            </select>
          </div>
        </div>

        <div style="margin-top:14px;">
          <label for="taskNotes">Notes</label>
          <textarea id="taskNotes" placeholder="Optional task notes"></textarea>
        </div>

        <div class="grid-4" style="margin-top:14px;">
          <div>
            <label for="priority">Priority</label>
            <select id="priority">
              <option>Low</option>
              <option selected>Medium</option>
              <option>High</option>
              <option>Urgent</option>
            </select>
          </div>
          <div>
            <label for="dueDate">Due date</label>
            <input id="dueDate" type="date" />
          </div>
          <div style="display:flex;align-items:end;">
            <label style="display:flex;gap:10px;align-items:center;margin:0;">
              <input id="completed" type="checkbox" style="width:20px;" />
              Completed
            </label>
          </div>
          <div style="display:flex;align-items:end;gap:10px;flex-wrap:wrap;">
            <button class="btn btn-primary" id="saveTaskBtn">Save Task</button>
            <button class="btn btn-secondary" id="cancelTaskBtn">Cancel</button>
          </div>
        </div>
      </div>

      <h3 class="section-title" style="font-size:24px; margin-top:10px;">Tasks</h3>
      <div id="taskList" class="tasks-stack"></div>
    </div>
  </div>

  <script>
    const storageKey = "taskManagerDataV2";

    let state = JSON.parse(localStorage.getItem(storageKey)) || { projects: [] };
    let currentProjectId = null;
    let editingTaskId = null;

    const homeScreen = document.getElementById("homeScreen");
    const projectScreen = document.getElementById("projectScreen");
    const projectList = document.getElementById("projectList");
    const projectTitle = document.getElementById("projectTitle");
    const taskList = document.getElementById("taskList");
    const taskFormCard = document.getElementById("taskFormCard");
    const taskFormTitle = document.getElementById("taskFormTitle");
    const summaryBar = document.getElementById("summaryBar");

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function uid() {
      return Date.now().toString() + Math.random().toString(16).slice(2);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getCurrentProject() {
      return state.projects.find(p => p.id === currentProjectId);
    }

    function clearTaskForm() {
      document.getElementById("taskTitle").value = "";
      document.getElementById("taskNotes").value = "";
      document.getElementById("assignedTo").value = "";
      document.getElementById("priority").value = "Medium";
      document.getElementById("dueDate").value = "";
      document.getElementById("completed").checked = false;
      editingTaskId = null;
      taskFormTitle.textContent = "Add Task";
    }

    function showHome() {
      currentProjectId = null;
      editingTaskId = null;
      taskFormCard.classList.add("hidden");
      homeScreen.classList.remove("hidden");
      projectScreen.classList.add("hidden");
      renderProjects();
    }

    function showProject(projectId) {
      currentProjectId = projectId;
      const project = getCurrentProject();
      if (!project) return;
      homeScreen.classList.add("hidden");
      projectScreen.classList.remove("hidden");
      projectTitle.textContent = project.name;
      document.getElementById("projectSubtext").textContent = `${project.tasks.length} task${project.tasks.length === 1 ? "" : "s"}`;
      taskFormCard.classList.add("hidden");
      clearTaskForm();
      renderTasks();
    }

    function renderProjects() {
      projectList.innerHTML = "";

      if (state.projects.length === 0) {
        projectList.innerHTML = '<div class="empty">No projects yet. Tap <strong>+ New Project</strong> to create one.</div>';
        return;
      }

      state.projects.forEach(project => {
        const total = project.tasks.length;
        const done = project.tasks.filter(task => task.completed).length;
        const card = document.createElement("div");
        card.className = "card project-card";
        card.innerHTML = `
          <h3>${escapeHtml(project.name)}</h3>
          <div class="project-meta">
            <span>${total} task${total === 1 ? "" : "s"}</span>
            <span>${done} complete</span>
          </div>
        `;
        card.addEventListener("click", () => showProject(project.id));
        projectList.appendChild(card);
      });
    }

    function renderSummary(project) {
      const total = project.tasks.length;
      const complete = project.tasks.filter(t => t.completed).length;
      const open = total - complete;
      const high = project.tasks.filter(t => t.priority === "High" || t.priority === "Urgent").length;

      summaryBar.innerHTML = `
        <div class="summary-chip">Total: ${total}</div>
        <div class="summary-chip">Open: ${open}</div>
        <div class="summary-chip">Completed: ${complete}</div>
        <div class="summary-chip">High priority: ${high}</div>
      `;
    }

    function renderTasks() {
      const project = getCurrentProject();
      if (!project) return;

      document.getElementById("projectSubtext").textContent = `${project.tasks.length} task${project.tasks.length === 1 ? "" : "s"}`;
      renderSummary(project);
      taskList.innerHTML = "";

      if (project.tasks.length === 0) {
        taskList.innerHTML = '<div class="empty">No tasks yet. Tap <strong>+ Add Task</strong> to create one.</div>';
        return;
      }

      project.tasks.forEach(task => {
        const item = document.createElement("div");
        item.className = "card task-card";
        const priorityClass = task.priority.toLowerCase();
        item.innerHTML = `
          <div class="task-main">
            <input class="task-check" type="checkbox" ${task.completed ? "checked" : ""} data-task-id="${task.id}" />
            <div style="min-width:0; flex:1;">
              <div class="task-title-row">
                <div class="task-title ${task.completed ? "done" : ""}">${escapeHtml(task.title)}</div>
                <span class="badge ${priorityClass}">${escapeHtml(task.priority)}</span>
              </div>
              ${task.notes ? `<p class="task-notes">${escapeHtml(task.notes)}</p>` : ""}
              <div class="task-meta">
                <span class="pill">${task.assignedTo ? "Assigned: " + escapeHtml(task.assignedTo) : "Unassigned"}</span>
                <span class="pill">${task.dueDate ? "Due: " + escapeHtml(task.dueDate) : "No due date"}</span>
                <span class="pill">${task.completed ? "Completed" : "In progress"}</span>
              </div>
            </div>
          </div>
          <div class="task-actions">
            <button class="mini-btn mini-edit" data-edit-id="${task.id}">Edit</button>
            <button class="mini-btn mini-delete" data-delete-id="${task.id}">Delete</button>
          </div>
        `;
        item.querySelector(".task-check").addEventListener("change", () => toggleTask(task.id));
        item.querySelector("[data-edit-id]").addEventListener("click", () => startEditTask(task.id));
        item.querySelector("[data-delete-id]").addEventListener("click", () => deleteTask(task.id));
        taskList.appendChild(item);
      });
    }

    function createProject() {
      const name = prompt("Enter project name");
      if (!name || !name.trim()) return;
      state.projects.push({ id: uid(), name: name.trim(), tasks: [] });
      saveState();
      renderProjects();
    }

    function toggleTask(taskId) {
      const project = getCurrentProject();
      if (!project) return;
      const task = project.tasks.find(t => t.id === taskId);
      if (!task) return;
      task.completed = !task.completed;
      saveState();
      renderTasks();
      renderProjects();
    }

    function startEditTask(taskId) {
      const project = getCurrentProject();
      if (!project) return;
      const task = project.tasks.find(t => t.id === taskId);
      if (!task) return;

      editingTaskId = task.id;
      taskFormTitle.textContent = "Edit Task";
      document.getElementById("taskTitle").value = task.title || "";
      document.getElementById("taskNotes").value = task.notes || "";
      document.getElementById("assignedTo").value = task.assignedTo || "";
      document.getElementById("priority").value = task.priority || "Medium";
      document.getElementById("dueDate").value = task.dueDate || "";
      document.getElementById("completed").checked = !!task.completed;
      taskFormCard.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteTask(taskId) {
      const project = getCurrentProject();
      if (!project) return;
      const confirmed = confirm("Delete this task?");
      if (!confirmed) return;
      project.tasks = project.tasks.filter(t => t.id !== taskId);
      if (editingTaskId === taskId) {
        clearTaskForm();
        taskFormCard.classList.add("hidden");
      }
      saveState();
      renderTasks();
      renderProjects();
    }

    function saveTask() {
      const project = getCurrentProject();
      if (!project) return;

      const title = document.getElementById("taskTitle").value.trim();
      const notes = document.getElementById("taskNotes").value.trim();
      const assignedTo = document.getElementById("assignedTo").value;
      const priority = document.getElementById("priority").value;
      const dueDate = document.getElementById("dueDate").value;
      const completed = document.getElementById("completed").checked;

      if (!title) {
        alert("Please enter a task title.");
        return;
      }

      if (editingTaskId) {
        const existing = project.tasks.find(t => t.id === editingTaskId);
        if (!existing) return;
        existing.title = title;
        existing.notes = notes;
        existing.assignedTo = assignedTo;
        existing.priority = priority;
        existing.dueDate = dueDate;
        existing.completed = completed;
      } else {
        project.tasks.push({
          id: uid(),
          title,
          notes,
          assignedTo,
          priority,
          dueDate,
          completed
        });
      }

      saveState();
      clearTaskForm();
      taskFormCard.classList.add("hidden");
      renderTasks();
      renderProjects();
    }

    document.getElementById("homeNewProjectBtn").addEventListener("click", createProject);
    document.getElementById("backBtn").addEventListener("click", showHome);
    document.getElementById("showTaskFormBtn").addEventListener("click", () => {
      clearTaskForm();
      taskFormCard.classList.remove("hidden");
      taskFormTitle.textContent = "Add Task";
    });
    document.getElementById("cancelTaskBtn").addEventListener("click", () => {
      clearTaskForm();
      taskFormCard.classList.add("hidden");
    });
    document.getElementById("saveTaskBtn").addEventListener("click", saveTask);

    renderProjects();
  </script>
</body>
</html>
