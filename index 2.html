<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    :root{
      --bg:#eef2f7;
      --panel:#ffffff;
      --panel-soft:#e9eef8;
      --text:#172033;
      --muted:#64748b;
      --line:#dbe4f0;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --shadow:0 10px 30px rgba(15, 23, 42, .08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .header{
      background:var(--panel-soft);
      border-bottom:1px solid var(--line);
      padding:24px;
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
    }
    .header h1{margin:0 0 8px;font-size:clamp(28px,5vw,48px)}
    .header p{margin:0;color:var(--muted);max-width:820px;font-size:clamp(15px,2.5vw,18px);line-height:1.45}
    .container{max-width:1150px;margin:0 auto;padding:24px}
    .btn{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-size:16px;
      cursor:pointer;
      transition:.15s ease;
      white-space:nowrap;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-secondary{background:#e8edf5;color:var(--text)}
    .btn-danger{background:#fee2e2;color:#b91c1c}
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }
    .section-title{margin:0 0 18px;font-size:36px}
    .hidden{display:none !important}
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .empty{
      padding:28px;
      color:var(--muted);
      text-align:center;
      border:2px dashed #c9d3e2;
      background:#fff;
      border-radius:var(--radius);
    }
    .project-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:18px;
    }
    .project-card{
      padding:20px;
      cursor:pointer;
    }
    .project-card h3{margin:0 0 8px;font-size:22px}
    .project-card p{margin:0;color:var(--muted)}
    .top-stats{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      margin:18px 0 22px;
    }
    .stat{
      padding:16px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow);
    }
    .stat-label{font-size:13px;color:var(--muted);margin-bottom:6px}
    .stat-value{font-size:24px;font-weight:700}
    .form-card{
      padding:18px;
      margin-bottom:20px;
    }
    label{
      display:block;
      font-weight:700;
      font-size:14px;
      margin-bottom:7px;
    }
    input[type="text"], input[type="date"], select, textarea{
      width:100%;
      padding:12px 13px;
      border-radius:12px;
      border:1px solid #cad4e0;
      font-size:16px;
      background:#fff;
    }
    textarea{min-height:92px;resize:vertical}
    .grid-2,.grid-4{
      display:grid;
      gap:14px;
    }
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .task-list{display:flex;flex-direction:column;gap:14px}
    .task-card{padding:18px}
    .task-head{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      flex-wrap:wrap;
    }
    .task-title-wrap{display:flex;gap:12px;align-items:flex-start;flex:1}
    .task-checkbox{
      width:22px;height:22px;margin-top:2px;
    }
    .task-title{font-size:20px;font-weight:700;margin-bottom:8px}
    .task-notes{color:#475569;line-height:1.45;margin-bottom:12px}
    .meta{display:flex;gap:10px;flex-wrap:wrap}
    .badge{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
    }
    .badge-priority-low{background:#e9f8ee;color:#166534}
    .badge-priority-medium{background:#fff7df;color:#a16207}
    .badge-priority-high{background:#ffe8dc;color:#c2410c}
    .badge-priority-urgent{background:#ffe2e2;color:#b91c1c}
    .badge-neutral{background:#edf2f7;color:#475569}
    .completed-text{text-decoration:line-through;opacity:.65}
    .muted{color:var(--muted)}
    .small{font-size:13px}
    @media (max-width: 860px){
      .header{flex-direction:column}
      .top-stats{grid-template-columns:repeat(2,minmax(0,1fr))}
      .grid-2,.grid-4{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>Task Manager</h1>
      <p>Manage projects, assign tasks, set priorities, schedule by date, and track completion.</p>
    </div>
    <button class="btn btn-primary" id="newProjectBtn">+ New Project</button>
  </div>

  <div class="container">
    <section id="homeScreen">
      <h2 class="section-title">Projects</h2>
      <div id="projectList" class="project-grid"></div>
    </section>

    <section id="projectScreen" class="hidden">
      <div class="toolbar">
        <div class="row">
          <button class="btn btn-secondary" id="backBtn">← Home</button>
          <button class="btn btn-secondary" id="renameProjectBtn">Rename Project</button>
        </div>
        <button class="btn btn-primary" id="toggleTaskFormBtn">+ Add Task</button>
      </div>

      <h2 id="projectTitle" class="section-title" style="margin-bottom:8px;"></h2>
      <div id="projectSubtitle" class="muted" style="margin-bottom:8px;"></div>

      <div class="top-stats">
        <div class="stat"><div class="stat-label">Total Tasks</div><div class="stat-value" id="statTotal">0</div></div>
        <div class="stat"><div class="stat-label">Completed</div><div class="stat-value" id="statCompleted">0</div></div>
        <div class="stat"><div class="stat-label">Open</div><div class="stat-value" id="statOpen">0</div></div>
        <div class="stat"><div class="stat-label">High / Urgent</div><div class="stat-value" id="statHigh">0</div></div>
      </div>

      <div id="taskFormCard" class="card form-card hidden">
        <div class="grid-2">
          <div>
            <label for="taskTitleInput">Task Title</label>
            <input id="taskTitleInput" type="text" placeholder="Enter task title">
          </div>
          <div>
            <label for="assignedToInput">Team Member</label>
            <input id="assignedToInput" type="text" placeholder="Assign to someone">
          </div>
        </div>

        <div style="margin-top:14px;">
          <label for="taskNotesInput">Notes</label>
          <textarea id="taskNotesInput" placeholder="Optional task notes"></textarea>
        </div>

        <div class="grid-4" style="margin-top:14px;">
          <div>
            <label for="priorityInput">Priority</label>
            <select id="priorityInput">
              <option>Low</option>
              <option selected>Medium</option>
              <option>High</option>
              <option>Urgent</option>
            </select>
          </div>
          <div>
            <label for="dueDateInput">Due Date</label>
            <input id="dueDateInput" type="date">
          </div>
          <div>
            <label for="completedInput">Completion</label>
            <select id="completedInput">
              <option value="false" selected>Open</option>
              <option value="true">Completed</option>
            </select>
          </div>
          <div>
            <label for="taskIdEditing">Mode</label>
            <input id="taskIdEditing" type="text" value="New Task" disabled>
          </div>
        </div>

        <div class="row" style="margin-top:16px;">
          <button class="btn btn-primary" id="saveTaskBtn">Save Task</button>
          <button class="btn btn-secondary" id="cancelTaskBtn">Cancel</button>
        </div>
      </div>

      <div class="toolbar">
        <h3 style="margin:0;font-size:26px;">Tasks</h3>
      </div>

      <div id="taskList" class="task-list"></div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "taskManager_full_featured_v1";
    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { projects: [] };
    let currentProjectId = null;
    let editingTaskId = null;

    const homeScreen = document.getElementById("homeScreen");
    const projectScreen = document.getElementById("projectScreen");
    const projectList = document.getElementById("projectList");
    const taskList = document.getElementById("taskList");
    const taskFormCard = document.getElementById("taskFormCard");
    const projectTitle = document.getElementById("projectTitle");
    const projectSubtitle = document.getElementById("projectSubtitle");

    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function uid(){
      return Date.now().toString() + Math.random().toString(16).slice(2);
    }

    function getCurrentProject(){
      return state.projects.find(p => p.id === currentProjectId);
    }

    function escapeHtml(str){
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderProjects(){
      projectList.innerHTML = "";
      if(state.projects.length === 0){
        projectList.innerHTML = '<div class="empty">No projects yet. Tap <strong>+ New Project</strong> to create one.</div>';
        return;
      }

      state.projects.forEach(project => {
        const total = project.tasks.length;
        const completed = project.tasks.filter(t => t.completed).length;
        const card = document.createElement("div");
        card.className = "card project-card";
        card.innerHTML = `
          <h3>${escapeHtml(project.name)}</h3>
          <p>${total} task${total === 1 ? "" : "s"} · ${completed} completed</p>
        `;
        card.addEventListener("click", () => openProject(project.id));
        projectList.appendChild(card);
      });
    }

    function renderStats(project){
      const total = project.tasks.length;
      const completed = project.tasks.filter(t => t.completed).length;
      const open = total - completed;
      const high = project.tasks.filter(t => ["High","Urgent"].includes(t.priority)).length;
      document.getElementById("statTotal").textContent = total;
      document.getElementById("statCompleted").textContent = completed;
      document.getElementById("statOpen").textContent = open;
      document.getElementById("statHigh").textContent = high;
      projectSubtitle.textContent = total ? `${completed} completed of ${total}` : "No tasks yet";
    }

    function showHome(){
      currentProjectId = null;
      editingTaskId = null;
      taskFormCard.classList.add("hidden");
      homeScreen.classList.remove("hidden");
      projectScreen.classList.add("hidden");
      renderProjects();
    }

    function openProject(projectId){
      currentProjectId = projectId;
      editingTaskId = null;
      const project = getCurrentProject();
      if(!project) return;
      homeScreen.classList.add("hidden");
      projectScreen.classList.remove("hidden");
      projectTitle.textContent = project.name;
      taskFormCard.classList.add("hidden");
      clearTaskForm();
      renderStats(project);
      renderTasks();
    }

    function newProject(){
      const name = prompt("Project name");
      if(!name || !name.trim()) return;
      state.projects.push({
        id: uid(),
        name: name.trim(),
        tasks: []
      });
      saveState();
      renderProjects();
    }

    function renameProject(){
      const project = getCurrentProject();
      if(!project) return;
      const name = prompt("Rename project", project.name);
      if(!name || !name.trim()) return;
      project.name = name.trim();
      saveState();
      projectTitle.textContent = project.name;
      renderProjects();
    }

    function clearTaskForm(){
      document.getElementById("taskTitleInput").value = "";
      document.getElementById("assignedToInput").value = "";
      document.getElementById("taskNotesInput").value = "";
      document.getElementById("priorityInput").value = "Medium";
      document.getElementById("dueDateInput").value = "";
      document.getElementById("completedInput").value = "false";
      document.getElementById("taskIdEditing").value = "New Task";
      editingTaskId = null;
    }

    function showTaskForm(){
      taskFormCard.classList.remove("hidden");
      document.getElementById("taskTitleInput").focus();
    }

    function hideTaskForm(){
      taskFormCard.classList.add("hidden");
      clearTaskForm();
    }

    function saveTask(){
      const project = getCurrentProject();
      if(!project) return;

      const title = document.getElementById("taskTitleInput").value.trim();
      const assignedTo = document.getElementById("assignedToInput").value.trim();
      const notes = document.getElementById("taskNotesInput").value.trim();
      const priority = document.getElementById("priorityInput").value;
      const dueDate = document.getElementById("dueDateInput").value;
      const completed = document.getElementById("completedInput").value === "true";

      if(!title){
        alert("Please enter a task title.");
        return;
      }

      if(editingTaskId){
        const task = project.tasks.find(t => t.id === editingTaskId);
        if(!task) return;
        task.title = title;
        task.assignedTo = assignedTo;
        task.notes = notes;
        task.priority = priority;
        task.dueDate = dueDate;
        task.completed = completed;
      } else {
        project.tasks.push({
          id: uid(),
          title,
          assignedTo,
          notes,
          priority,
          dueDate,
          completed
        });
      }

      saveState();
      renderStats(project);
      renderTasks();
      hideTaskForm();
      renderProjects();
    }

    function editTask(taskId){
      const project = getCurrentProject();
      if(!project) return;
      const task = project.tasks.find(t => t.id === taskId);
      if(!task) return;

      editingTaskId = task.id;
      document.getElementById("taskTitleInput").value = task.title || "";
      document.getElementById("assignedToInput").value = task.assignedTo || "";
      document.getElementById("taskNotesInput").value = task.notes || "";
      document.getElementById("priorityInput").value = task.priority || "Medium";
      document.getElementById("dueDateInput").value = task.dueDate || "";
      document.getElementById("completedInput").value = String(!!task.completed);
      document.getElementById("taskIdEditing").value = "Editing Task";
      showTaskForm();
    }

    function deleteTask(taskId){
      const project = getCurrentProject();
      if(!project) return;
      const ok = confirm("Delete this task?");
      if(!ok) return;
      project.tasks = project.tasks.filter(t => t.id !== taskId);
      saveState();
      renderStats(project);
      renderTasks();
      renderProjects();
    }

    function toggleTask(taskId){
      const project = getCurrentProject();
      if(!project) return;
      const task = project.tasks.find(t => t.id === taskId);
      if(!task) return;
      task.completed = !task.completed;
      saveState();
      renderStats(project);
      renderTasks();
      renderProjects();
    }

    function renderTasks(){
      const project = getCurrentProject();
      if(!project) return;
      taskList.innerHTML = "";

      if(project.tasks.length === 0){
        taskList.innerHTML = '<div class="empty">No tasks yet. Tap <strong>+ Add Task</strong> to create one.</div>';
        return;
      }

      project.tasks.forEach(task => {
        const priorityClass = "badge-priority-" + String(task.priority || "Medium").toLowerCase();
        const card = document.createElement("div");
        card.className = "card task-card";

        card.innerHTML = `
          <div class="task-head">
            <div class="task-title-wrap">
              <input class="task-checkbox" type="checkbox" ${task.completed ? "checked" : ""} aria-label="Toggle completion">
              <div>
                <div class="task-title ${task.completed ? "completed-text" : ""}">${escapeHtml(task.title)}</div>
                ${task.notes ? `<div class="task-notes">${escapeHtml(task.notes)}</div>` : ""}
                <div class="meta">
                  <span class="badge ${priorityClass}">${escapeHtml(task.priority || "Medium")}</span>
                  <span class="badge badge-neutral">${task.assignedTo ? "Team: " + escapeHtml(task.assignedTo) : "Unassigned"}</span>
                  <span class="badge badge-neutral">${task.dueDate ? "Due: " + escapeHtml(task.dueDate) : "No due date"}</span>
                  <span class="badge badge-neutral">${task.completed ? "Completed" : "Open"}</span>
                </div>
              </div>
            </div>
            <div class="row">
              <button class="btn btn-secondary">Edit</button>
              <button class="btn btn-danger">Delete</button>
            </div>
          </div>
        `;

        const checkbox = card.querySelector(".task-checkbox");
        const buttons = card.querySelectorAll("button");
        checkbox.addEventListener("change", () => toggleTask(task.id));
        buttons[0].addEventListener("click", () => editTask(task.id));
        buttons[1].addEventListener("click", () => deleteTask(task.id));

        taskList.appendChild(card);
      });
    }

    document.getElementById("newProjectBtn").addEventListener("click", newProject);
    document.getElementById("backBtn").addEventListener("click", showHome);
    document.getElementById("renameProjectBtn").addEventListener("click", renameProject);
    document.getElementById("toggleTaskFormBtn").addEventListener("click", showTaskForm);
    document.getElementById("saveTaskBtn").addEventListener("click", saveTask);
    document.getElementById("cancelTaskBtn").addEventListener("click", hideTaskForm);

    renderProjects();
  </script>
</body>
</html>
